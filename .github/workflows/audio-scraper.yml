name: Audio Scraper

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-audio:
    name: "🎙️ Scrape Audio Sources"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system audio deps
        run: sudo apt-get install -y ffmpeg libsndfile1 libsox-dev

      - name: Install Python deps
        run: pip install -r python/requirements.txt

      - name: Run Audio Scraper
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HF_TOKEN:             ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO:      "anas775/DETECT-AI-Dataset"
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          ELEVENLABS_API_KEY:   ${{ secrets.ELEVENLABS_API_KEY }}
          FREESOUND_API_KEY:    ${{ secrets.FREESOUND_API_KEY }}
        run: python3 python/audio_analysis/audio_scraper.py
