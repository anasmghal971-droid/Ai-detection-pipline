name: Supabase Cleanup

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cleanup:
    name: "🧹 Clean Buffer + Vacuum"
    runs-on: ubuntu-latest
    steps:
      - name: Run cleanup + check storage
        run: |
          echo "Running cleanup..."
          RESULT=$(curl -sf -X POST \
            "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/run_full_cleanup" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Cleanup result: $RESULT"

          echo "Storage usage:"
          curl -sf \
            "${{ secrets.SUPABASE_URL }}/rest/v1/storage_usage?select=table_name,total_size,live_rows" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" | \
            python3 -c "
import sys, json
try:
    rows = json.load(sys.stdin)
    total_mb = 0
    for r in rows:
        mb = r.get('total_size','0')
        print(f'  {r[\"table_name\"]:28s} {mb:>10s}  ({r[\"live_rows\"]:>8,} rows)')
except Exception as e:
    print(f'Error: {e}')
    print(sys.stdin.read()[:500])
"
