name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare-workers/**'
      - '.github/workflows/deploy-workers.yml'
  workflow_dispatch:

jobs:
  # Deploy scrapers first (dispatcher depends on them via service bindings)
  deploy-text-scraper:
    name: "1/4 Deploy Text Scraper"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/scrapers
          command: deploy --config wrangler-text.toml
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
            NEWSAPI_KEY
            REDDIT_CLIENT_ID
            REDDIT_CLIENT_SECRET
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NEWSAPI_KEY:          ${{ secrets.NEWSAPI_KEY }}
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}

  deploy-image-scraper:
    name: "2/4 Deploy Image Scraper"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/scrapers
          command: deploy --config wrangler-image.toml
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
            UNSPLASH_ACCESS_KEY
            PEXELS_API_KEY
            PIXABAY_API_KEY
            FLICKR_API_KEY
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          UNSPLASH_ACCESS_KEY:  ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:      ${{ secrets.PIXABAY_API_KEY }}
          FLICKR_API_KEY:       ${{ secrets.FLICKR_API_KEY }}

  deploy-video-scraper:
    name: "3/4 Deploy Video Scraper"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/scrapers
          command: deploy --config wrangler-video.toml
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
            HF_TOKEN
            YOUTUBE_API_KEY
            PEXELS_API_KEY
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HF_TOKEN:             ${{ secrets.HF_TOKEN }}
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}

  # Dispatcher last — depends on all 3 scrapers being live
  deploy-dispatcher:
    name: "4/4 Deploy Dispatcher (cron)"
    runs-on: ubuntu-latest
    needs: [deploy-text-scraper, deploy-image-scraper, deploy-video-scraper]
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/dispatcher
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
            HF_TOKEN
            HF_DATASET_REPO
            NEWSAPI_KEY
            YOUTUBE_API_KEY
            UNSPLASH_ACCESS_KEY
            PEXELS_API_KEY
            PIXABAY_API_KEY
            FLICKR_API_KEY
            REDDIT_CLIENT_ID
            REDDIT_CLIENT_SECRET
            UPSTASH_REDIS_URL
            UPSTASH_REDIS_TOKEN
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HF_TOKEN:             ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO:      "anas775/DETECT-AI-Dataset"
          NEWSAPI_KEY:          ${{ secrets.NEWSAPI_KEY }}
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          UNSPLASH_ACCESS_KEY:  ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:      ${{ secrets.PIXABAY_API_KEY }}
          FLICKR_API_KEY:       ${{ secrets.FLICKR_API_KEY }}
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          UPSTASH_REDIS_URL:    ${{ secrets.UPSTASH_REDIS_URL }}
          UPSTASH_REDIS_TOKEN:  ${{ secrets.UPSTASH_REDIS_TOKEN }}

  init-hf-repo:
    name: "0/4 Initialize HuggingFace Repo"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install huggingface_hub
      - name: Init HF Dataset Repo
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: cd python/hf_push && python3 init_hf_repo.py
