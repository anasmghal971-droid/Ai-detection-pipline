name: Deploy DETECT-AI Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  init-hf:
    name: "🤗 Init HF Repo"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install huggingface_hub
      - run: python3 python/hf_push/init_hf_repo.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

  # Deploy scrapers first — dispatcher depends on all of them via service bindings

  deploy-scraper-text:
    name: "☁️ Scraper: Text"
    runs-on: ubuntu-latest
    needs: init-hf
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/scraper-text
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
            NEWSAPI_KEY
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NEWSAPI_KEY:          ${{ secrets.NEWSAPI_KEY }}
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}

  deploy-scraper-image:
    name: "☁️ Scraper: Image (Real + AI)"
    runs-on: ubuntu-latest
    needs: init-hf
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/scraper-image
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
            UNSPLASH_ACCESS_KEY
            PEXELS_API_KEY
            PIXABAY_API_KEY
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          UNSPLASH_ACCESS_KEY:  ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:      ${{ secrets.PIXABAY_API_KEY }}

  deploy-scraper-video:
    name: "☁️ Scraper: Video"
    runs-on: ubuntu-latest
    needs: init-hf
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/scraper-video
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
            YOUTUBE_API_KEY
            PEXELS_API_KEY
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HF_TOKEN:             ${{ secrets.HF_TOKEN }}
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}

  deploy-text-news:
    name: "☁️ Scraper: Text News (5 langs)"
    runs-on: ubuntu-latest
    needs: init-hf
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/text-news
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  deploy-image-open:
    name: "☁️ Scraper: Image Open (LAION/COCO)"
    runs-on: ubuntu-latest
    needs: init-hf
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/image-open
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # Dispatcher LAST — needs all scrapers deployed first (service bindings)
  deploy-dispatcher:
    name: "☁️ Dispatcher (20 workers, cron */5min)"
    runs-on: ubuntu-latest
    needs:
      - deploy-scraper-text
      - deploy-scraper-image
      - deploy-scraper-video
      - deploy-text-news
      - deploy-image-open
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/dispatcher
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
            HF_TOKEN
            YOUTUBE_API_KEY
            UNSPLASH_ACCESS_KEY
            PEXELS_API_KEY
            PIXABAY_API_KEY
            UPSTASH_REDIS_URL
            UPSTASH_REDIS_TOKEN
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HF_TOKEN:             ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO:      "anas775/DETECT-AI-Dataset"
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          UNSPLASH_ACCESS_KEY:  ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:      ${{ secrets.PIXABAY_API_KEY }}
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          UPSTASH_REDIS_URL:    ${{ secrets.UPSTASH_REDIS_URL }}
          UPSTASH_REDIS_TOKEN:  ${{ secrets.UPSTASH_REDIS_TOKEN }}
