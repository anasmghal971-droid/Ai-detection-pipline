name: Deploy All CF Workers + Init HF Repo

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────
# STEP 0: Init HuggingFace repo (runs first, all scrapers wait)
# ─────────────────────────────────────────────────────────────────
jobs:
  init-hf-repo:
    name: "🤗 Init HuggingFace Repo"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install huggingface_hub
      - name: Init HF Dataset Repo
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python3 python/hf_push/init_hf_repo.py

  # ───────────────────────────────────────────────────────────────
  # TEXT SCRAPER (original)
  # NOTE: REDDIT secrets are OPTIONAL — worker skips Reddit if missing
  # ───────────────────────────────────────────────────────────────
  deploy-text-scraper:
    name: "☁️ 1 — Text Scraper"
    runs-on: ubuntu-latest
    needs: init-hf-repo
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/scrapers
          command: deploy --config wrangler-text.toml
          # Only REQUIRED secrets here — missing secrets cause job failure
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
            NEWSAPI_KEY
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NEWSAPI_KEY:          ${{ secrets.NEWSAPI_KEY }}
          # Optional — worker handles empty values gracefully
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}

  # ───────────────────────────────────────────────────────────────
  # IMAGE SCRAPER (original)
  # NOTE: FLICKR_API_KEY is OPTIONAL — worker skips Flickr if missing
  # ───────────────────────────────────────────────────────────────
  deploy-image-scraper:
    name: "☁️ 2 — Image Scraper"
    runs-on: ubuntu-latest
    needs: init-hf-repo
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/scrapers
          command: deploy --config wrangler-image.toml
          # Only REQUIRED secrets — Flickr is optional
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
            UNSPLASH_ACCESS_KEY
            PEXELS_API_KEY
            PIXABAY_API_KEY
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          UNSPLASH_ACCESS_KEY:  ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:      ${{ secrets.PIXABAY_API_KEY }}
          FLICKR_API_KEY:       ${{ secrets.FLICKR_API_KEY }}

  # ───────────────────────────────────────────────────────────────
  # VIDEO SCRAPER (original)
  # FIX: explicit --name flag prevents "missing Worker name" error
  # ───────────────────────────────────────────────────────────────
  deploy-video-scraper:
    name: "☁️ 3 — Video Scraper"
    runs-on: ubuntu-latest
    needs: init-hf-repo
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/scrapers
          # --name explicitly provided to fix "Required Worker name missing" error
          command: deploy --config wrangler-video.toml --name detect-ai-scraper-video
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
            HF_TOKEN
            YOUTUBE_API_KEY
            PEXELS_API_KEY
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HF_TOKEN:             ${{ secrets.HF_TOKEN }}
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}

  # ───────────────────────────────────────────────────────────────
  # TEXT NEWS WORKER (5 languages)
  # ───────────────────────────────────────────────────────────────
  deploy-text-news:
    name: "☁️ 4 — Text News (EN/AR/FR/DE/ES)"
    runs-on: ubuntu-latest
    needs: init-hf-repo
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/text-news
          command: deploy --name detect-ai-text-news
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # ───────────────────────────────────────────────────────────────
  # IMAGE OPEN WORKER (Open Images / LAION / COCO)
  # ───────────────────────────────────────────────────────────────
  deploy-image-open:
    name: "☁️ 5 — Image Open (LAION/COCO/OpenImages)"
    runs-on: ubuntu-latest
    needs: init-hf-repo
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/image-open
          command: deploy --name detect-ai-image-open
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # ───────────────────────────────────────────────────────────────
  # DISPATCHER — runs LAST (has service bindings to all scrapers)
  # ───────────────────────────────────────────────────────────────
  deploy-dispatcher:
    name: "☁️ 6 — Dispatcher (cron every 5min)"
    runs-on: ubuntu-latest
    needs:
      - deploy-text-scraper
      - deploy-image-scraper
      - deploy-video-scraper
      - deploy-text-news
      - deploy-image-open
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/dispatcher
          command: deploy --name detect-ai-dispatcher
          # Only secrets that EXIST — optional ones go in env only
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
            HF_TOKEN
            NEWSAPI_KEY
            YOUTUBE_API_KEY
            UNSPLASH_ACCESS_KEY
            PEXELS_API_KEY
            PIXABAY_API_KEY
            UPSTASH_REDIS_URL
            UPSTASH_REDIS_TOKEN
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HF_TOKEN:             ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO:      "anas775/DETECT-AI-Dataset"
          NEWSAPI_KEY:          ${{ secrets.NEWSAPI_KEY }}
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          UNSPLASH_ACCESS_KEY:  ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:      ${{ secrets.PIXABAY_API_KEY }}
          FLICKR_API_KEY:       ${{ secrets.FLICKR_API_KEY }}
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          UPSTASH_REDIS_URL:    ${{ secrets.UPSTASH_REDIS_URL }}
          UPSTASH_REDIS_TOKEN:  ${{ secrets.UPSTASH_REDIS_TOKEN }}
