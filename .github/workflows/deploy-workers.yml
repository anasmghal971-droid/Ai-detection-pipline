name: Deploy All CF Workers + Init HF Repo

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 0. HF repo init (must run first) ─────────────────────────
  init-hf-repo:
    name: "🤗 Init HuggingFace Repo"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install huggingface_hub
      - name: Init HF Dataset Repo
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python3 python/hf_push/init_hf_repo.py

  # ── 1. Text scraper ───────────────────────────────────────────
  # FIX: own directory → standard wrangler.toml → no name lookup issues
  # FIX: REDDIT_CLIENT_ID/SECRET removed from `secrets:` (not in repo yet)
  #       they are passed as env vars only — worker handles empty values
  deploy-text-scraper:
    name: "☁️ 1/6 — Text Scraper"
    runs-on: ubuntu-latest
    needs: init-hf-repo
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/scraper-text
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
            NEWSAPI_KEY
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NEWSAPI_KEY:          ${{ secrets.NEWSAPI_KEY }}
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}

  # ── 2. Image scraper ──────────────────────────────────────────
  # FIX: own directory → standard wrangler.toml
  # FIX: FLICKR_API_KEY removed from `secrets:` (not in repo yet)
  #       passed as env var only — worker skips Flickr if empty
  deploy-image-scraper:
    name: "☁️ 2/6 — Image Scraper"
    runs-on: ubuntu-latest
    needs: init-hf-repo
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/scraper-image
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
            UNSPLASH_ACCESS_KEY
            PEXELS_API_KEY
            PIXABAY_API_KEY
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          UNSPLASH_ACCESS_KEY:  ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:      ${{ secrets.PIXABAY_API_KEY }}
          FLICKR_API_KEY:       ${{ secrets.FLICKR_API_KEY }}

  # ── 3. Video scraper ──────────────────────────────────────────
  # FIX: own directory → standard wrangler.toml → eliminates
  #      "Required Worker name missing" error completely
  deploy-video-scraper:
    name: "☁️ 3/6 — Video Scraper"
    runs-on: ubuntu-latest
    needs: init-hf-repo
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/scraper-video
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
            HF_TOKEN
            YOUTUBE_API_KEY
            PEXELS_API_KEY
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HF_TOKEN:             ${{ secrets.HF_TOKEN }}
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}

  # ── 4. Text news (5 languages) ────────────────────────────────
  deploy-text-news:
    name: "☁️ 4/6 — Text News (EN/AR/FR/DE/ES)"
    runs-on: ubuntu-latest
    needs: init-hf-repo
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/text-news
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # ── 5. Image open (LAION / COCO / Open Images) ────────────────
  deploy-image-open:
    name: "☁️ 5/6 — Image Open (LAION/COCO/OpenImages)"
    runs-on: ubuntu-latest
    needs: init-hf-repo
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/image-open
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # ── 6. Dispatcher — MUST run after all scrapers ───────────────
  # Has service bindings to workers 1-5, so they must exist first
  deploy-dispatcher:
    name: "☁️ 6/6 — Dispatcher (cron every 5min 24/7)"
    runs-on: ubuntu-latest
    needs:
      - deploy-text-scraper
      - deploy-image-scraper
      - deploy-video-scraper
      - deploy-text-news
      - deploy-image-open
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-workers/dispatcher
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_KEY
            HF_TOKEN
            NEWSAPI_KEY
            YOUTUBE_API_KEY
            UNSPLASH_ACCESS_KEY
            PEXELS_API_KEY
            PIXABAY_API_KEY
            UPSTASH_REDIS_URL
            UPSTASH_REDIS_TOKEN
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HF_TOKEN:             ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO:      "anas775/DETECT-AI-Dataset"
          NEWSAPI_KEY:          ${{ secrets.NEWSAPI_KEY }}
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          UNSPLASH_ACCESS_KEY:  ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:      ${{ secrets.PIXABAY_API_KEY }}
          FLICKR_API_KEY:       ${{ secrets.FLICKR_API_KEY }}
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          UPSTASH_REDIS_URL:    ${{ secrets.UPSTASH_REDIS_URL }}
          UPSTASH_REDIS_TOKEN:  ${{ secrets.UPSTASH_REDIS_TOKEN }}
