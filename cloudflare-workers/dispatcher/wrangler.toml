name = "detect-ai-dispatcher"
main = "index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["*/5 * * * *"]

[vars]
PIPELINE_ENABLED = "true"
WORKER_ID = "dispatcher-v3"

# Service bindings — Worker-to-Worker (CF required method)
[[services]]
binding = "SCRAPER_TEXT"
service = "detect-ai-scraper-text"

[[services]]
binding = "SCRAPER_IMAGE"
service = "detect-ai-scraper-image"

[[services]]
binding = "SCRAPER_VIDEO"
service = "detect-ai-scraper-video"

[[services]]
binding = "SCRAPER_TEXT_NEWS"
service = "detect-ai-text-news"

[[services]]
binding = "SCRAPER_IMAGE_OPEN"
service = "detect-ai-image-open"

# Secrets injected via GitHub Actions:
# SUPABASE_URL, SUPABASE_SERVICE_KEY, HF_TOKEN, YOUTUBE_API_KEY,
# UNSPLASH_ACCESS_KEY, PEXELS_API_KEY, PIXABAY_API_KEY,
# UPSTASH_REDIS_URL, UPSTASH_REDIS_TOKEN
